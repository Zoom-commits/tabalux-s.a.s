<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabalux S.A.S - Support System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>Tabalux S.A.S</h1>
                <p>Technical Support System</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="form-group">
                    <label for="userType">User Type</label>
                    <select id="userType" name="userType" required>
                        <option value="">Select...</option>
                        <option value="cliente">Client</option>
                        <option value="consultor">Consultant</option>
                        <option value="gerente">Manager</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary">Sign In</button>
                
                <div class="demo-credentials">
                    <p><strong>Test Credentials:</strong></p>
                    <p>Client: username: <code>cliente1</code> / password: <code>cliente123</code></p>
                    <p>Consultant: username: <code>consultor1</code> / password: <code>consultor123</code></p>
                    <p>Manager: username: <code>gerente1</code> / password: <code>gerente123</code></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="app.js?v=6"></script>
</body>
</html>
